# Hal Higdon Half Marathon - Intermediate 2
# 12-week plan for experienced runners seeking a PR
# 5-6 runs/week, higher mileage, more quality sessions

meta:
  name: "Hal Higdon Half Marathon Intermediate 2"
  distance: half-marathon
  weeks: 12
  peak_km: 65
  description: "Hal Higdon Intermediate 2. 5-6 runs/week, higher mileage, tempo + intervals + long runs up to 24km."
  level: intermediate-advanced

# Paces are defined in your session.json — not here.
# This plan uses: $easy, $tempo, $speed, $race, $recovery

workouts:
  Easy 5k:
    - warmup: lap z2
    - run: 5000m z2
    - cooldown: lap z1
  Easy 6k:
    - warmup: lap z2
    - run: 6000m z2
    - cooldown: lap z1
  Easy 8k:
    - warmup: lap z2
    - run: 8000m z2
    - cooldown: lap z1
  Easy 10k:
    - warmup: 1000m z2
    - run: 8000m z2
    - cooldown: 1000m z1
  Easy 11k:
    - warmup: 1000m z2
    - run: 9000m z2
    - cooldown: 1000m z1
  Tempo 5k:
    - warmup: 2000m z2
    - run: 5000m $tempo
    - cooldown: 2000m z2
  Tempo 6k:
    - warmup: 2000m z2
    - run: 6000m $tempo
    - cooldown: 2000m z2
  Tempo 8k:
    - warmup: 2000m z2
    - run: 8000m $tempo
    - cooldown: 2000m z2
  Tempo 10k:
    - warmup: 2000m z2
    - run: 10000m $tempo
    - cooldown: 2000m z2
  Intervals 5x1000:
    - warmup: 2000m z2
    - repeat(5):
      - run: 1000m $speed
      - recovery: 400m z1
    - cooldown: 2000m z2
  Intervals 6x1000:
    - warmup: 2000m z2
    - repeat(6):
      - run: 1000m $speed
      - recovery: 400m z1
    - cooldown: 2000m z2
  Intervals 7x1000:
    - warmup: 2000m z2
    - repeat(7):
      - run: 1000m $speed
      - recovery: 400m z1
    - cooldown: 2000m z2
  Intervals 8x1000:
    - warmup: 2000m z2
    - repeat(8):
      - run: 1000m $speed
      - recovery: 400m z1
    - cooldown: 2000m z2
  Race Pace 8k:
    - warmup: 2000m z2
    - run: 8000m $race
    - cooldown: 2000m z2
  Race Pace 10k:
    - warmup: 2000m z2
    - run: 10000m $race
    - cooldown: 2000m z2
  Long Run 11k:
    - warmup: 1000m z2
    - run: 9000m z2
    - cooldown: 1000m z1
  Long Run 13k:
    - warmup: 1000m z2
    - run: 11000m z2
    - cooldown: 1000m z1
  Long Run 14k:
    - warmup: 1000m z2
    - run: 12000m z2
    - cooldown: 1000m z1
  Long Run 16k:
    - warmup: 1000m z2
    - run: 14000m z2
    - cooldown: 1000m z1
  Long Run 18k:
    - warmup: 1000m z2
    - run: 16000m z2
    - cooldown: 1000m z1
  Long Run 19k:
    - warmup: 1000m z2
    - run: 17000m z2
    - cooldown: 1000m z1
  Long Run 21k:
    - warmup: 1000m z2
    - run: 19000m z2
    - cooldown: 1000m z1
  Long Run 23k:
    - warmup: 1000m z2
    - run: 21000m z2
    - cooldown: 1000m z1
  Long Run 24k:
    - warmup: 1000m z2
    - run: 22000m z2
    - cooldown: 1000m z1

