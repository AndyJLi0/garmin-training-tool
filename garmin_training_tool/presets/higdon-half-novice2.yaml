# Hal Higdon Half Marathon - Novice 2
# 12-week plan for runners with some base fitness
# Adds pace work and cross-training to Novice 1 structure

meta:
  name: "Hal Higdon Half Marathon Novice 2"
  distance: half-marathon
  weeks: 12
  peak_km: 45
  description: "Hal Higdon Novice 2. Adds tempo runs and pace work to the beginner framework."
  level: beginner-intermediate

# Paces are defined in your session.json — not here.
# This plan uses: $easy, $tempo, $race, $recovery

workouts:
  Easy 5k:
    - warmup: lap z2
    - run: 5000m z2
    - cooldown: lap z1
  Easy 6k:
    - warmup: lap z2
    - run: 6000m z2
    - cooldown: lap z1
  Easy 8k:
    - warmup: lap z2
    - run: 8000m z2
    - cooldown: lap z1
  Tempo 5k:
    - warmup: 1500m z2
    - run: 5000m $tempo
    - cooldown: 1500m z2
  Tempo 6k:
    - warmup: 1500m z2
    - run: 6000m $tempo
    - cooldown: 1500m z2
  Tempo 8k:
    - warmup: 1500m z2
    - run: 8000m $tempo
    - cooldown: 1500m z2
  Race Pace 5k:
    - warmup: 1500m z2
    - run: 5000m $race
    - cooldown: 1500m z2
  Race Pace 8k:
    - warmup: 1500m z2
    - run: 8000m $race
    - cooldown: 1500m z2
  Long Run 8k:
    - warmup: 1000m z2
    - run: 6000m z2
    - cooldown: 1000m z1
  Long Run 10k:
    - warmup: 1000m z2
    - run: 8000m z2
    - cooldown: 1000m z1
  Long Run 11k:
    - warmup: 1000m z2
    - run: 9000m z2
    - cooldown: 1000m z1
  Long Run 13k:
    - warmup: 1000m z2
    - run: 11000m z2
    - cooldown: 1000m z1
  Long Run 14k:
    - warmup: 1000m z2
    - run: 12000m z2
    - cooldown: 1000m z1
  Long Run 16k:
    - warmup: 1000m z2
    - run: 14000m z2
    - cooldown: 1000m z1
  Long Run 18k:
    - warmup: 1000m z2
    - run: 16000m z2
    - cooldown: 1000m z1
  Long Run 19k:
    - warmup: 1000m z2
    - run: 17000m z2
    - cooldown: 1000m z1

